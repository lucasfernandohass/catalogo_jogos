  # Preferências
  shared_preferences: ^2.5.3

  json_annotation: ^4.9.0

  # Utilidades
  equatable: ^2.0.7
  intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Testes
  mocktail: ^1.0.4

  build_runner: ^2.5.4
  json_serializable: ^6.9.5

