name: catalogo_jogos
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_dotenv: ^5.2.1

  # Estado
  flutter_riverpod: ^2.6.1

  # Navegação
  go_router: ^16.0.0

  # HTTP
  dio: ^5.9.0

  # Banco local
  sqflite: ^2.4.2
