name: catalogo_jogos
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_dotenv: ^5.2.1

  # Estado
  flutter_riverpod: ^2.6.1

  # Navegação
  go_router: ^16.0.0

  # HTTP
  dio: ^5.9.0

  # Banco local
  sqflite: ^2.4.2
  path: ^1.9.1

  # Preferências
  shared_preferences: ^2.5.3

  json_annotation: ^4.9.0

  # Utilidades
  equatable: ^2.0.7
  intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Testes
  mocktail: ^1.0.4

  build_runner: ^2.5.4
  json_serializable: ^6.9.5

  # Integração
  integration_test:
    sdk: flutter


flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

